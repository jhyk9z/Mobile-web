<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정보 기말 JB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card" aria-labelledby="loginTitle">
        <p class="eyebrow">Information Final</p>
        <h1 id="loginTitle">정보 기말 JB</h1>
        <p class="login-copy">계정 정보를 입력해 로그인하세요.</p>

        <form class="login-form" id="loginForm">
          <label>
            아이디
            <input type="text" name="userId" autocomplete="username" required />
          </label>
          <label>
            비밀번호
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button type="submit">로그인</button>
        </form>

        <p class="form-message" id="loginMessage" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
