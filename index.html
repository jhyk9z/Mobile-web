<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정보 기말 JB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-page" id="authPage">
      <section class="auth-card" aria-labelledby="authTitle">
        <p class="eyebrow">Information Final</p>
        <h1 id="authTitle">정보 기말 JB</h1>
        <p class="auth-copy">로그인 후 단원별 정리 화면으로 이동합니다.</p>

        <div class="auth-tabs" role="tablist" aria-label="계정 메뉴">
          <button class="tab-button active" type="button" data-auth-mode="login">로그인</button>
          <button class="tab-button" type="button" data-auth-mode="signup">회원가입</button>
        </div>

        <form class="auth-form active" id="loginForm">
          <label>
            아이디
            <input type="text" name="userId" autocomplete="username" required />
          </label>
          <label>
            비밀번호
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button type="submit">로그인</button>
        </form>

        <form class="auth-form" id="signupForm">
          <label>
            이름
            <input type="text" name="name" autocomplete="name" required />
          </label>
          <label>
            아이디
            <input type="text" name="userId" autocomplete="username" required />
          </label>
          <label>
            비밀번호
            <input type="password" name="password" autocomplete="new-password" minlength="4" required />
          </label>
          <button type="submit">회원가입</button>
        </form>

        <p class="form-message" id="authMessage" aria-live="polite"></p>
      </section>
    </main>

    <main class="study-page hidden" id="studyPage">
      <header class="study-header">
        <div>
          <p class="eyebrow">Study Sections</p>
          <h1>정보 기말 JB</h1>
        </div>
        <div class="user-area">
          <span id="userBadge">사용자</span>
          <button class="logout-button" id="logoutButton" type="button">로그아웃</button>
        </div>
      </header>

      <section class="unit-grid" aria-label="단원 목록">
        <article class="unit-card">
          <span>01</span>
          <h2>단원 제목 입력 예정</h2>
          <p>수업 내용을 보내주면 핵심 개념, 용어, 시험 포인트로 정리합니다.</p>
        </article>
        <article class="unit-card">
          <span>02</span>
          <h2>단원 제목 입력 예정</h2>
          <p>각 단원은 카드형 섹션으로 나누어 빠르게 복습할 수 있게 만들 예정입니다.</p>
        </article>
        <article class="unit-card">
          <span>03</span>
          <h2>단원 제목 입력 예정</h2>
          <p>필요하면 예시, 표, 암기 포인트, 확인 문제까지 추가할 수 있습니다.</p>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
