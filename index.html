<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정보 기말 JB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-page" id="authPage">
      <section class="auth-card" aria-labelledby="authTitle">
        <p class="eyebrow">Information Final</p>
        <h1 id="authTitle">정보 기말 JB</h1>
        <p class="auth-copy">로그인 후 단원별 학습 화면으로 이동합니다.</p>

        <div class="auth-tabs" role="tablist" aria-label="계정 메뉴">
          <button class="tab-button active" type="button" data-auth-mode="login">로그인</button>
          <button class="tab-button" type="button" data-auth-mode="signup">회원가입</button>
        </div>

        <form class="auth-form active" id="loginForm">
          <label>
            이메일
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label>
            비밀번호
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button type="submit">로그인</button>
        </form>

        <form class="auth-form" id="signupForm">
          <label>
            이름
            <input type="text" name="name" autocomplete="name" required />
          </label>
          <label>
            이메일
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label>
            비밀번호
            <input type="password" name="password" autocomplete="new-password" minlength="4" required />
          </label>
          <button type="submit">회원가입</button>
        </form>

        <p class="form-message" id="authMessage" aria-live="polite"></p>
      </section>
    </main>

    <main class="study-page hidden" id="studyPage">
      <header class="study-header">
        <div>
          <p class="eyebrow">StudyAce Mode</p>
          <h1>정보 기말 JB</h1>
          <p class="study-subtitle">단원을 선택하고 개념, 용어, 퀴즈로 복습하세요.</p>
        </div>
        <div class="user-area">
          <span id="userBadge">사용자</span>
          <button class="logout-button" id="logoutButton" type="button">로그아웃</button>
        </div>
      </header>

      <section class="study-layout">
        <aside class="unit-sidebar" aria-label="단원 목록">
          <div class="panel-heading">
            <span>Units</span>
            <strong id="unitCount">0</strong>
          </div>
          <div class="unit-list" id="unitList"></div>
        </aside>

        <section class="lesson-panel" aria-live="polite">
          <div class="lesson-toolbar">
            <div>
              <p class="eyebrow">Current Unit</p>
              <h2 id="lessonTitle">단원 선택</h2>
            </div>
            <div class="progress-box">
              <span id="progressLabel">0%</span>
              <div class="progress-track">
                <span id="progressFill"></span>
              </div>
            </div>
          </div>

          <div class="lesson-tabs" role="tablist" aria-label="학습 모드">
            <button class="lesson-tab active" type="button" data-view="summary">개념</button>
            <button class="lesson-tab" type="button" data-view="keywords">용어</button>
            <button class="lesson-tab" type="button" data-view="quiz">퀴즈</button>
          </div>

          <div class="lesson-content" id="lessonContent"></div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
